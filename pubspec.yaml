name: hooplytics
description: "Hooplytics – Twoje centrum statystyk rzutowych 🏀"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  provider: ^6.1.2
  supabase_flutter: ^2.8.4
  google_sign_in: ^6.2.2
  speech_to_text: ^7.0.0
  audioplayers: ^6.1.0
  permission_handler: ^11.3.1
  wakelock_plus: ^1.2.8
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/hooplytics.png"

flutter:
  uses-material-design: true

  assets:
    - assets/avatars/
    - assets/sounds/hit.mp3
    - assets/sounds/swish.mp3
    - assets/sounds/miss.mp3
    - assets/sounds/undo.mp3
    - assets/sounds/end.mp3